version: "3.8"

services:
  groupie-tracker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: groupie-tracker
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
    restart: unless-stopped
    volumes:
      - ./static:/app/static:ro
    networks:
      - groupie-network
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:8080/",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  groupie-network:
    driver: bridge
