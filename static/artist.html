<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Groupie Tracker</title>
    <link rel="stylesheet" href="/static/artist.css">
    <link rel="icon" href="/static/favicon.ico">
</head>
<body>
    <div id="artist-container">
        <div class="artist-card" data-id="{{.ID}}">
            <img src="{{.Image}}" alt="{{.Name}}">
            <h1>{{.Name}}</h1>
            <p><strong>Members:</strong><br>
                <textarea class="textarea-field" readonly>{{range .Members}}{{.}} {{end}}</textarea>
            </p>
            <p><strong>Creation Date:</strong><br>
                <input type="text" class="input-field" value="{{.CreationDate}}" readonly>
            </p>
            <p><strong>First Album:</strong><br>
                <input type="text" class="input-field"value="{{.FirstAlbum}}" readonly>
            </p>
            <p><strong>Performance Locations:</strong><br>
                <textarea class="textarea-field" readonly>{{range .Locations}}{{.}} {{end}}</textarea>
            </p>
            <p><strong>Performance Dates:</strong><br>
                <textarea class="textarea-field" readonly>{{range .Dates}}{{.}} {{end}}</textarea>
            </p>
            <p><strong>Previous Performances:</strong><br>
                <textarea class="textarea-field" readonly>{{range .Relations}}{{.}} {{end}}</textarea>
            </p>
            <a href="/" class="go-back-button">Go Back</a>
        </div>
    </div>
</body>
</html>
