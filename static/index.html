<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Groupie Tracker</title>
    <link rel="stylesheet" href="/static/style.css" />
    <link rel="icon" href="/static/favicon.png" />
  </head>
  <body>
    <!-- Header -->
    <header class="header">
      <h1 class="header-title">🎵 Groupie Tracker</h1>
      <p class="header-subtitle">Click the card for more artist information</p>
    </header>

    <!-- Search Bar -->
    <div class="search-section">
      <div class="search-wrapper">
        <span class="search-icon">🔍</span>
        <input
          type="text"
          id="search-input"
          class="search-input"
          placeholder="Search artists by name..."
          aria-label="Search artists"
        />
      </div>
    </div>

    <!-- No Results Message -->
    <div id="no-results" class="no-results hidden">
      <p>No artists found matching your search</p>
    </div>

    <!-- Artists Grid (flex-grow pushes footer down) -->
    <main class="main-container">
      <div id="artist-container" class="artist-grid">
        {{range .}}
        <a href="/artist/{{.ID}}" class="artist-card">
          <div class="card-image-wrapper">
            <img src="{{.Image}}" alt="{{.Name}}" class="card-image" />
          </div>
          <div class="card-content">
            <h2 class="card-title">{{.Name}}</h2>
            <div class="card-details">
              <p><span class="label">Created:</span> {{.CreationDate}}</p>
              <p><span class="label">First Album:</span> {{.FirstAlbum}}</p>
            </div>
          </div>
        </a>
        {{end}}
      </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
      <p>&copy; 2025 The Groupie Tracker. All rights reserved.</p>
    </footer>

    <script>
      const searchInput = document.getElementById("search-input");
      const artistContainer = document.getElementById("artist-container");
      const noResults = document.getElementById("no-results");
      const artistCards = Array.from(artistContainer.querySelectorAll("a"));

      searchInput.addEventListener("input", (e) => {
        const searchTerm = e.target.value.toLowerCase().trim();
        let visibleCount = 0;

        artistCards.forEach((card) => {
          const artistName = card.querySelector("h2").textContent.toLowerCase();
          const isMatch = artistName.includes(searchTerm);

          if (isMatch || searchTerm === "") {
            card.classList.remove("hidden");
            visibleCount++;
          } else {
            card.classList.add("hidden");
          }
        });

        if (visibleCount === 0 && searchTerm !== "") {
          noResults.classList.remove("hidden");
        } else {
          noResults.classList.add("hidden");
        }
      });

      searchInput.focus();
    </script>
  </body>
</html>
